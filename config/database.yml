default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST") { "db" } %>
  username: <%= ENV.fetch("DB_USERNAME") { "postgres" } %>
  password: <%= ENV.fetch("DB_PASSWORD") { "password" } %>

development:
  primary:
    <<: *default
    database: order_payment_api_development
  cache:
    <<: *default
    database: order_payment_api_development_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: order_payment_api_development_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: order_payment_api_development_cable
    migrations_paths: db/cable_migrate

test:
  <<: *default
  database: order_payment_api_test

production:
  primary:
    <<: *default
    database: order_payment_api_production
    username: order_payment_api
    password: <%= ENV["ORDER_PAYMENT_API_DATABASE_PASSWORD"] %>
  cache:
    <<: *default
    database: order_payment_api_production_cache
    username: order_payment_api
    password: <%= ENV["ORDER_PAYMENT_API_DATABASE_PASSWORD"] %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: order_payment_api_production_queue
    username: order_payment_api
    password: <%= ENV["ORDER_PAYMENT_API_DATABASE_PASSWORD"] %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: order_payment_api_production_cable
    username: order_payment_api
    password: <%= ENV["ORDER_PAYMENT_API_DATABASE_PASSWORD"] %>
    migrations_paths: db/cable_migrate
